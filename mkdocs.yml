site_name: EmbodiedGen Documentation
site_url: https://horizonrobotics.github.io/EmbodiedGen/docs/
docs_dir: docs/documentation
repo_name: "EmbodiedGen"
repo_url: https://github.com/HorizonRobotics/EmbodiedGen
copyright: "Copyright (c) 2026 Horizon Robotics"
use_directory_urls: false

nav:
  - 🏠 Home: index.md
  - 🚀 Installation: install.md
  - 📘 Tutorials:
    - Overview: tutorials/index.md
    - 🧱 Asset Generation:
      - Image-to-3D: tutorials/image_to_3d.md
      - Text-to-3D: tutorials/text_to_3d.md
      - Texture Generation: tutorials/texture_edit.md
      - Soft-Body Simulation: tutorials/soft_body.md
      - Articulated Objects (DIPO): tutorials/articulated_gen.md
      - Affordance: tutorials/affordance.md
    - 🏠 Scene Generation:
      - Room Generation: tutorials/room_gen.md
      - 3D Scene Generation: tutorials/scene_gen.md
    - 🌍 World Composition:
      - Layout Generation: tutorials/layout_gen.md
      - Digital Twin Creation: tutorials/digital_twin.md
    - 💬 3D Vibe Coding: tutorials/vibe_coding.md
    - 📦 Any Simulators: tutorials/any_simulators.md
    - 🤖 Robot Learning: tutorials/robot_learning.md
  - 🧩 Services:
    - Overview: services/index.md
    - Image-to-3D: services/image_to_3d.md
    - Text-to-3D: services/text_to_3d.md
    - Texture Generation: services/texture_edit.md
    - Asset Visualizer: services/visualize_asset.md
  - 📚 API Reference:
    - Overview: api/index.md
    - Data: api/data.md
    - Envs: api/envs.md
    - Models: api/models.md
    - Skills: api/skills.md
    - Trainer: api/trainer.md
    - Utilities: api/utils.md
    - Validators: api/validators.md
  - ✨ Acknowledgement: acknowledgement.md

extra:
  social:
    - icon: simple/huggingface
      link: https://huggingface.co/collections/HorizonRobotics/embodiedgen
    - icon: fontawesome/brands/github
      link: https://github.com/HorizonRobotics/EmbodiedGen
    - icon: simple/arxiv
      link: https://arxiv.org/abs/2607.07459
    - icon: fontawesome/solid/globe
      link: https://horizonrobotics.github.io/robot_lab/embodied_gen/index.html
    - icon: fontawesome/brands/youtube
      link: https://youtu.be/MIkJJSVM8L4

theme:
  name: material
  language: en
  logo: assets/logo.png
  favicon: assets/favicon.svg
  font:
    text: Hanken Grotesk
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.path
    - navigation.tabs
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [embodied_gen]
          options:
            show_signature_annotations: true
            separate_signature: true
            show_root_toc_entry: false
            docstring_style: google
            show_source: true
            merge_init_into_class: true
            show_root_heading: true
            show_root_full_path: true

  - git-revision-date-localized:
      enable_creation_date: true

extra_css:
  - stylesheets/extra.css
  - https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.js
  - path: https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js
    type: module
  - js/model_viewer.js

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - admonition
  - attr_list
  - md_in_html

